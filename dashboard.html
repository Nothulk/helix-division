<!DOCTYPE html>
<html>
<head>
<title>Helix Division - System</title>

<style>
body {
  background: black;
  color: lime;
  font-family: monospace;
  padding: 30px;
  overflow: hidden;
  transition: 0.1s;
}

/* flicker */
@keyframes flicker {
  0% {opacity: 1;}
  50% {opacity: 0.85;}
  100% {opacity: 1;}
}
body {
  animation: flicker 2s infinite;
}

/* glitch hover */
.glitch:hover {
  color: white;
  letter-spacing: 3px;
}

/* warning */
.red {
  color: red;
  cursor: pointer;
}

/* flash */
.flash {
  background: white !important;
  color: black !important;
}

/* shake */
@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(5px,-5px); }
  50% { transform: translate(-5px,5px); }
  75% { transform: translate(5px,5px); }
  100% { transform: translate(0,0); }
}
</style>
</head>

<body>

<h2>HELIX DIVISION INTERNAL SYSTEM</h2>

<p id="access">> Access Level: UNAUTHORIZED</p>
<p id="status">> Status: MONITORED</p>

<br>

<p>[1] <a href="#" style="color:lime;">Subject Files</a></p>

<p>[2] <span class="red glitch" onclick="access1()">████████</span></p>
<p>[3] <span class="red glitch" onclick="access2()">████████</span></p>

<br>

<p id="warning" class="red">WARNING: Activity is being recorded</p>

<script>

// 🔴 status escalation
let states = ["MONITORED", "TRACKING", "IDENTIFIED", "FOUND YOU"];
setInterval(() => {
  let s = states[Math.floor(Math.random()*states.length)];
  document.getElementById("status").innerText = "> Status: " + s;
}, 2500);

// ⚡ random flash
setInterval(() => {
  if(Math.random() > 0.8){
    document.body.classList.add("flash");
    setTimeout(()=> document.body.classList.remove("flash"), 100);
  }
}, 2000);

// 👁️ disturbing popup
setInterval(() => {
  if(Math.random() > 0.7){
    let msg = document.createElement("div");
    msg.innerText = "YOU ARE NOT SUPPOSED TO BE HERE";
    msg.style.position = "fixed";
    msg.style.top = "50%";
    msg.style.left = "50%";
    msg.style.transform = "translate(-50%, -50%)";
    msg.style.color = "red";
    msg.style.fontSize = "20px";
    document.body.appendChild(msg);

    setTimeout(() => msg.remove(), 800);
  }
}, 4000);

// 🌑 blackout
setInterval(() => {
  if(Math.random() > 0.85){
    document.body.style.background = "black";
    document.body.innerHTML = "<h1 style='color:red;'>CONNECTION LOST</h1>";

    setTimeout(() => location.reload(), 800);
  }
}, 6000);

// 🔐 passwords
function access1() {
  let pass = prompt("ENTER ACCESS CODE");
  if(pass === "alpha7") {
    alert("ACCESS GRANTED");
  } else {
    alert("ACCESS DENIED");
  }
}

function access2() {
  let pass = prompt("ENTER ACCESS CODE");
  if(pass === "omega9") {
    alert("ACCESS GRANTED");
  } else {
    alert("ACCESS DENIED");
  }
}

</script>

</body>
</html>
