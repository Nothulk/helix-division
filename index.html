<!DOCTYPE html>
<html>
<head>
<title>Helix Division</title>

<style>
body {
  background: url('bg.jpg') no-repeat center center fixed;
  background-size: cover;
  color: red;
  font-family: monospace;
  text-align: center;
  padding-top: 20%;
  overflow: hidden;
  animation: slowZoom 20s infinite alternate;
}

/* dark overlay */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.75);
  z-index: 0;
}

/* keep text above overlay */
body * {
  position: relative;
  z-index: 1;
}

/* zoom animation */
@keyframes slowZoom {
  0% {background-size: 100%;}
  100% {background-size: 110%;}
}

h1 {
  animation: flicker 1.5s infinite;
}

button {
  background: black;
  color: red;
  border: 1px solid red;
  padding: 10px 20px;
  cursor: pointer;
  margin-top: 20px;
}

button:hover {
  background: red;
  color: black;
}

input {
  background: black;
  color: red;
  border: 1px solid red;
  padding: 10px;
  margin-top: 20px;
}

@keyframes flicker {
  0% {opacity: 1;}
  50% {opacity: 0.2;}
  100% {opacity: 1;}
}
</style>
</head>

<body>

<h1 id="text">You weren't supposed to find this.</h1>

<input type="password" id="pass" placeholder="Enter Access Code">

<br><br>

<button onclick="enter()">ENTER</button>


<p style="color:black;">
c3ViamVjdDEw
</p>

<script>

function enter() {
  let password = document.getElementById("pass").value;

  if(password === "subject10") {
    document.body.innerHTML = "<h1 style='color:red;'>ACCESS GRANTED</h1>";

    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 2000);

  } else {
    jumpscare();
  }
}

// 💀 jumpscare function
function jumpscare() {

  // creepy sound
  let sound = new Audio("https://www.soundjay.com/horror/sounds/horror-scream-01.mp3");
  sound.volume = 1;
  sound.play();

  // show full screen image
  document.body.innerHTML = `
    <img src="scare.jpg" 
    style="position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover;">
  `;

  // shake effect
  document.body.style.animation = "shake 0.2s infinite";

  // back to home after 1.5 sec
  setTimeout(() => {
    location.reload();
  }, 1500);
}

</script>

</body>
</html>
