  color: red;
  font-family: monospace;
  text-align: center;
  padding-top: 20%;
  overflow: hidden;
  animation: slowZoom 20s infinite alternate;
}

/* dark overlay */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.75);
  z-index: 0;
}

/* keep text above overlay */
body * {
  position: relative;
  z-index: 1;
}

/* zoom animation */
@keyframes slowZoom {
  0% {background-size: 100%;}
  100% {background-size: 110%;}
}

h1 {
  animation: flicker 1.5s infinite;
}

button {
  background: black;
  color: red;
  border: 1px solid red;
  padding: 10px 20px;
  cursor: pointer;
  margin-top: 20px;
}

button:hover {
  background: red;
  color: black;
}

input {
  background: black;
  color: red;
  border: 1px solid red;
  padding: 10px;
  margin-top: 20px;
}

@keyframes flicker {
  0% {opacity: 1;}
  50% {opacity: 0.2;}
  100% {opacity: 1;}
}
</style>
